project:
  title: "Desafio 1 - Elementos de Aprendizado de Máquina"

execute:
  warning: false
  message: false

format:
  pdf:
    fontsize: 10pt
    geometry:
      - top=15mm
      - left=20mm
      - right=20mm
      - bottom=15mm
    include-in-header:
      text: |
        \pagenumbering{gobble}
        \usepackage{enumitem}
        \setlist{nosep}
        \usepackage[small,bf]{caption}
        \setlength{\belowcaptionskip}{-5pt}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{multirow}
        \usepackage{wrapfig}
        \usepackage{float}
        \floatplacement{table}{H}
        \usepackage{tabularray}
        \usepackage{codehigh}
        \usepackage[normalem]{ulem}
        \UseTblrLibrary{booktabs}
        \UseTblrLibrary{siunitx}
  html:
    df-print: paged

